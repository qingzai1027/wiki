<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>演示</title>
</head>
<body>
 <input type="button" value="按钮1" id="bt1"/><br>
 <input type="button" value="按钮2" id="bt2"/><br>
 <input type="button" value="按钮3" id="bt3"/>
<img src="" alt="" id="im"/>
    <script>
        function change_image(image_url){
            var imgObject = document.getElementById("im");
            imgObject.src = image_url;
        }
    
        document.getElementById("bt1").onclick = function awrfa(){ change_image("a.jpg") };;
        document.getElementById("bt2").onclick = function asdfa(){ change_image("c.jpg") };;
        document.getElementById("bt3").onclick = function asddfas(){ change_image("b.jpg") };

        // bt1.onclick = function awrfa(){ change_image("a.jpg") };
        // bt3.onclick = function asdfa(){ change_image("c.jpg") };
        // bt2.onclick = function asddfas(){ change_image("b.jpg") };

      
    </script>
</body>
</html>
